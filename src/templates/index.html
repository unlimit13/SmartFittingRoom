<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LG Styler Smart Fitting Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; color: #222; }

    header {
      background: #1a1a2e; color: #fff;
      padding: 14px 24px; display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header span { font-size: 0.85rem; opacity: 0.7; }

    .container { display: flex; gap: 16px; padding: 16px; max-width: 1200px; margin: auto; }

    /* Left: camera */
    .camera-panel { flex: 0 0 50%; }
    .camera-panel img { width: 100%; border-radius: 8px; border: 2px solid #ddd; }

    /* Right: controls + results */
    .info-panel { flex: 1; display: flex; flex-direction: column; gap: 12px; }

    .card {
      background: #fff; border-radius: 8px;
      padding: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }
    .card h3 { font-size: 0.9rem; color: #666; margin-bottom: 10px; }

    /* Palette */
    #palette-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .color-chip { width: 36px; height: 36px; border-radius: 4px; border: 1px solid #ccc; }

    /* Text input */
    .input-row { display: flex; gap: 8px; }
    #text-input {
      flex: 1; padding: 8px 12px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 0.95rem;
    }
    #recommend-btn {
      padding: 8px 16px; background: #1a1a2e; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem;
    }
    #recommend-btn:hover { background: #2d2d50; }
    #recommend-btn:disabled { background: #999; cursor: default; }

    /* Status */
    #status { font-size: 0.8rem; color: #888; min-height: 18px; margin-top: 6px; }

    /* Results */
    #results-container { display: flex; gap: 10px; flex-wrap: wrap; }
    .result-card {
      flex: 1 1 calc(33% - 10px); min-width: 140px;
      background: #fafafa; border: 1px solid #eee;
      border-radius: 8px; overflow: hidden;
      display: flex; flex-direction: column;
    }
    .result-card img.thumb { width: 100%; height: 160px; object-fit: cover; }
    .result-info { padding: 8px; font-size: 0.8rem; }
    .result-info .cat-badge {
      display: inline-block; background: #e8eaf6; color: #3949ab;
      border-radius: 4px; padding: 1px 6px; font-size: 0.7rem; margin-bottom: 4px;
    }
    .result-info .name { font-weight: 600; margin-bottom: 4px; word-break: keep-all; }
    .result-info .score { color: #888; font-size: 0.72rem; margin-bottom: 6px; }
    .result-info a { font-size: 0.78rem; color: #1565c0; }
    .result-info img.qr { width: 72px; margin-top: 6px; display: block; }

    /* Try-On button */
    #tryon-btn {
      display: none; width: 100%; margin-top: 12px;
      padding: 10px; background: #7b1fa2; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem;
    }
    #tryon-btn:hover { background: #9c27b0; }
    #tryon-btn:disabled { background: #999; cursor: default; }
    #tryon-status { font-size: 0.8rem; color: #888; min-height: 18px; margin-top: 6px; }

    .empty-msg { color: #aaa; font-size: 0.9rem; padding: 8px 0; }

    /* Try-On modal */
    #tryon-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 100;
      align-items: center; justify-content: center;
    }
    #tryon-modal.open { display: flex; }
    .modal-box {
      background: #fff; border-radius: 12px;
      padding: 20px; max-width: 520px; width: 90%;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .modal-box h2 { font-size: 1rem; color: #333; }
    .modal-box img { width: 100%; border-radius: 8px; }
    .modal-close {
      padding: 8px 24px; background: #1a1a2e; color: #fff;
      border: none; border-radius: 6px; cursor: pointer;
    }
    .modal-clothes {
      display: flex; gap: 10px; width: 100%;
    }
    .modal-clothes img {
      flex: 1; height: 120px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd;
    }
  </style>
</head>
<body>

<header>
  <h1>LG Styler Smart Fitting Room</h1>
  <span>On-Device AI 패션 추천</span>
</header>

<div class="container">
  <!-- Left: camera feed with live detection -->
  <div class="camera-panel">
    <img src="/detection_feed" alt="카메라 라이브 피드 (detection)">
  </div>

  <!-- Right: info -->
  <div class="info-panel">

    <!-- Color palette -->
    <div class="card">
      <h3>감지된 색상 팔레트</h3>
      <div id="palette-row">
        <span class="empty-msg">추천 버튼을 눌러 분석하세요</span>
      </div>
    </div>

    <!-- Text query -->
    <div class="card">
      <h3>어떤 상황인가요?</h3>
      <div class="input-row">
        <input id="text-input" type="text"
          placeholder="예: 맑은 날 여자친구와 데이트하려고 해. 추천해줘.">
        <button id="recommend-btn">추천 →</button>
      </div>
      <div id="status"></div>
    </div>

    <!-- Results -->
    <div class="card">
      <h3>오늘의 추천 코디 Top-3</h3>
      <div id="results-container">
        <span class="empty-msg">추천 결과가 여기에 표시됩니다</span>
      </div>
      <button id="tryon-btn">👗 Virtual Try-On (상의 + 하의 착용해보기)</button>
      <div id="tryon-status"></div>
    </div>

  </div>
</div>

<!-- Try-On result modal -->
<div id="tryon-modal">
  <div class="modal-box">
    <h2>Virtual Try-On 결과</h2>
    <div class="modal-clothes" id="modal-clothes"></div>
    <img id="tryon-result-img" src="" alt="Try-On 결과">
    <div id="tryon-elapsed" style="font-size:0.8rem;color:#888;"></div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<script>
const btn = document.getElementById('recommend-btn');
const statusEl = document.getElementById('status');
const paletteRow = document.getElementById('palette-row');
const resultsContainer = document.getElementById('results-container');
const textInput = document.getElementById('text-input');
const tryonBtn = document.getElementById('tryon-btn');
const tryonStatus = document.getElementById('tryon-status');
const tryonModal = document.getElementById('tryon-modal');
const tryonResultImg = document.getElementById('tryon-result-img');
const tryonElapsed = document.getElementById('tryon-elapsed');
const modalClothes = document.getElementById('modal-clothes');

let tryonTop = null;    // {image_path, name}
let tryonBottom = null; // {image_path, name}

btn.addEventListener('click', async () => {
  btn.disabled = true;
  statusEl.textContent = '분석 중...';
  resultsContainer.innerHTML = '<span class="empty-msg">분석 중입니다...</span>';
  tryonBtn.style.display = 'none';
  tryonTop = null;
  tryonBottom = null;

  const t0 = Date.now();
  try {
    const resp = await fetch('/recommend', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text_query: textInput.value, use_camera: true }),
    });
    const data = await resp.json();
    const elapsed = Date.now() - t0;

    if (data.error) {
      statusEl.textContent = '오류: ' + data.error;
      resultsContainer.innerHTML = '<span class="empty-msg">오류가 발생했습니다</span>';
      return;
    }

    // Update palette
    if (data.palette && data.palette.length > 0) {
      paletteRow.innerHTML = data.palette
        .map(c => `<div class="color-chip" style="background:${c}" title="${c}"></div><span style="font-size:0.75rem;color:#666">${c}</span>`)
        .join('');
    }

    // Update status
    const detected = data.detected ? '✓ 인물 감지됨' : '인물 미감지 (텍스트 전용)';
    statusEl.textContent = `${detected} | 응답 시간: ${elapsed}ms (서버: ${data.elapsed_ms}ms)`;

    // Render results
    if (!data.results || data.results.length === 0) {
      resultsContainer.innerHTML = '<span class="empty-msg">추천 결과가 없습니다</span>';
      return;
    }

    const catLabel = { tops: '상의', bottoms: '하의', shoes: '신발', outer: '아우터' };
    resultsContainer.innerHTML = data.results.map(r => `
      <div class="result-card">
        <div class="result-info">
          <span class="cat-badge">${catLabel[r.category] || r.category}</span>
          <div class="name">${r.name || r.product_id}</div>
          <div class="score">점수: ${r.final_score}</div>
          <a href="${r.url}" target="_blank">무신사에서 보기 ↗</a>
          ${r.qr_b64 ? `<img class="qr" src="data:image/png;base64,${r.qr_b64}" alt="QR">` : ''}
        </div>
      </div>
    `).join('');

    // Collect first top & bottom for try-on
    for (const r of data.results) {
      if (!tryonTop && r.category === 'tops' && r.image_path)
        tryonTop = { image_path: r.image_path, name: r.name };
      if (!tryonBottom && r.category === 'bottoms' && r.image_path)
        tryonBottom = { image_path: r.image_path, name: r.name };
    }
    if (tryonTop || tryonBottom) tryonBtn.style.display = 'block';

  } catch (e) {
    statusEl.textContent = '네트워크 오류: ' + e.message;
    resultsContainer.innerHTML = '<span class="empty-msg">오류가 발생했습니다</span>';
  } finally {
    btn.disabled = false;
  }
});

textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') btn.click();
});

tryonBtn.addEventListener('click', async () => {
  tryonBtn.disabled = true;
  tryonStatus.textContent = 'Virtual Try-On 생성 중... (30~60초 소요)';

  try {
    const body = {};
    if (tryonTop)    body.top_image_path    = tryonTop.image_path;
    if (tryonBottom) body.bottom_image_path = tryonBottom.image_path;

    const t0 = Date.now();
    const resp = await fetch('/tryon', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();

    if (data.error) {
      tryonStatus.textContent = '오류: ' + data.error;
      return;
    }

    // Show clothes thumbnails in modal
    const clothesHtml = [
      tryonTop    ? `<img src="/product_image/${tryonTop.image_path}"    title="${tryonTop.name}">` : '',
      tryonBottom ? `<img src="/product_image/${tryonBottom.image_path}" title="${tryonBottom.name}">` : '',
    ].join('');
    modalClothes.innerHTML = clothesHtml;

    tryonResultImg.src = 'data:image/jpeg;base64,' + data.result_b64;
    tryonElapsed.textContent = `소요 시간: ${data.elapsed_ms}ms`;
    tryonModal.classList.add('open');
    tryonStatus.textContent = `완료 (${data.elapsed_ms}ms)`;

  } catch (e) {
    tryonStatus.textContent = '네트워크 오류: ' + e.message;
  } finally {
    tryonBtn.disabled = false;
  }
});

function closeModal() {
  tryonModal.classList.remove('open');
}

// Close modal on backdrop click
tryonModal.addEventListener('click', e => {
  if (e.target === tryonModal) closeModal();
});
</script>
</body>
</html>
