<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Fitting Room</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap');

    :root {
      --teal:        #34d399;
      --teal-bright: #6ee7b7;
      --teal-dim:    rgba(52, 211, 153, 0.12);
      --teal-border: rgba(52, 211, 153, 0.28);
      --teal-glow:   rgba(52, 211, 153, 0.45);
      --panel:       rgba(8, 10, 20, 0.88);
      --border:      rgba(255, 255, 255, 0.07);
      --text:        #f0f4f8;
      --muted:       #64748b;
      --sub:         #94a3b8;
      --gold:        #fbbf24;
      --purple:      #a78bfa;
      --rail-w:      min(248px, calc(26vw - 16px));
      --bar-h:       58px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', system-ui, sans-serif;
      background: #0a0a0f;
      color: var(--text);
      width: 100vw; height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Camera ─────────────────────────────────────────── */
    #cam {
      position: fixed;
      top: 50%; left: 50%;
      width: 100vh; height: 100vw;
      object-fit: cover;
      transform: translate(-50%, -50%) rotate(270deg) scaleX(-1);
      z-index: 0;
    }

    #vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.55) 0%, transparent 18%),
        linear-gradient(to top,    rgba(0,0,0,.75) 0%, transparent 35%);
    }

    /* ── Top bar ─────────────────────────────────────────── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--bar-h);
      z-index: 30;
      background: transparent;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }
    #clock { font-size: 1.25rem; font-weight: 500; color: var(--text); font-variant-numeric: tabular-nums; }
    .brand-group {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      height: var(--bar-h);
      max-width: calc(100vw - 260px);
      white-space: nowrap;
      pointer-events: none;
    }
    .brand-logo {
      display: block;
      width: auto;
      height: 32px;
      max-width: 92px;
      object-fit: contain;
      flex: 0 0 auto;
    }
    .brand-separator {
      flex: 0 0 auto;
      color: var(--teal-bright);
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1;
    }
    .app-title {
      flex: 0 1 auto;
      min-width: 0;
      font-size: 1.45rem; font-weight: 700; letter-spacing: -0.3px;
      background: linear-gradient(90deg, var(--teal) 0%, var(--teal-bright) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @media (max-width: 760px) {
      .brand-group { gap: 8px; max-width: calc(100vw - 170px); }
      .brand-logo { height: 24px; max-width: 64px; }
      .brand-separator { font-size: 0.95rem; }
      .app-title { font-size: 1.08rem; }
      #topbar { padding: 0 14px; }
    }
    #weather { font-size: 1.25rem; color: var(--text); display: flex; align-items: center; gap: 6px; }

    /* ── Zone box ────────────────────────────────────────── */
    #zone-box {
      position: fixed;
      left: 26vw; right: 26vw;
      top: calc(var(--bar-h) + 14px);
      bottom: 14px;
      z-index: 5; pointer-events: none;
      border: 2px dashed rgba(52, 211, 153, 0.50);
      border-radius: 28px;
      transition: border-color .35s, box-shadow .35s;
    }
    #zone-box.in-zone {
      border-color: var(--teal-glow);
      box-shadow: 0 0 0 1px rgba(52,211,153,0.10) inset;
    }

    /* ── Zone message ────────────────────────────────────── */
    #zone-msg {
      position: fixed;
      left: 50%; top: 54%;
      transform: translate(-50%, -50%);
      z-index: 8; pointer-events: none;
      background: rgba(8, 10, 20, 0.82);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--teal-border);
      border-radius: 18px;
      padding: 22px 32px;
      text-align: center;
      transition: opacity .3s;
    }
    #zone-msg.hidden { opacity: 0; }
    .zone-msg-title { font-size: 1.35rem; font-weight: 600; line-height: 1.5; color: var(--teal); }
    .zone-msg-sub { margin-top: 8px; font-size: 0.82rem; color: rgba(255,255,255,0.35); }

    /* ── Rail base ───────────────────────────────────────── */
    .rail {
      position: fixed;
      top: var(--bar-h); bottom: 0;
      width: var(--rail-w);
      z-index: 20;
      background: transparent;
      display: flex; flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 14px;
      padding: 6px 12px 14px;
    }
    #left-rail  { left: 0; padding-top: 130px; }
    #right-rail { right: 0; padding-top: 220px; }

    .rail-label {
      font-size: 1rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--teal); text-align: center; margin-bottom: 2px;
    }
    .rail-section { display: flex; flex-direction: column; align-items: center; gap: 6px; width: 100%; }
    .rail-divider { width: 55%; height: 1px; background: var(--border); flex-shrink: 0; }

    /* ── Pills (vertical in rail) ────────────────────────── */
    .pill-group-v { display: flex; flex-direction: column; gap: 5px; width: 100%; }
    .pill {
      width: 100%; height: 70px;
      border-radius: 14px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--sub);
      font-family: inherit; font-size: 1.35rem; font-weight: 500;
      cursor: pointer; position: relative; overflow: hidden;
      transition: color .2s, border-color .2s, background .2s;
    }
    .pill.active {
      background: var(--teal-dim);
      border-color: var(--teal);
      color: var(--teal);
      font-weight: 700;
    }

    /* ── Mic button ──────────────────────────────────────── */
    #btn-mic {
      width: 88px; height: 88px; flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--sub); font-size: 1.7rem;
      cursor: pointer; position: relative; overflow: hidden;
      transition: border-color .2s;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-mic.listening {
      border-color: var(--teal);
      background: var(--teal);
      color: #052e16;
      animation: mic-glow 1s ease-in-out infinite;
    }
    @keyframes mic-glow {
      0%,100% { box-shadow: 0 0 0 0 rgba(52,211,153,0.5); }
      50%      { box-shadow: 0 0 0 10px rgba(52,211,153,0); }
    }

    /* Text query input (compact, for fallback typing) */
    #text-input {
      width: 100%; height: 44px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-family: inherit; font-size: 1rem;
      padding: 0 12px;
      outline: none;
      transition: border-color .2s;
    }
    #text-input::placeholder { color: var(--muted); font-size: 0.92rem; }
    #text-input:focus { border-color: rgba(52,211,153,0.4); }

    /* 음성 인식 결과: 가운데 박스 아래쪽 반투명 오버레이 */
    #voice-display {
      position: fixed;
      left: 50%; top: 72%;
      transform: translate(-50%, -50%);
      z-index: 8; pointer-events: none;
      display: none;
      max-width: 60vw; padding: 14px 28px;
      background: rgba(8, 10, 20, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--teal-border);
      border-radius: 16px;
      text-align: center; font-size: 1.15rem; color: var(--teal);
    }
    #voice-display.active { display: block; }

    /* ── Right rail buttons ──────────────────────────────── */
    #btn-recommend {
      width: 100%; height: 86px;
      border-radius: 14px; border: none;
      background: var(--teal); color: #052e16;
      font-family: inherit; font-size: 1.35rem; font-weight: 700;
      cursor: pointer; position: relative; overflow: hidden;
      transition: opacity .2s, box-shadow .2s;
      box-shadow: 0 4px 20px rgba(52,211,153,0.30);
    }
    #btn-recommend:hover { box-shadow: 0 4px 30px rgba(52,211,153,0.50); }
    #btn-recommend.dwelling { box-shadow: 0 0 40px rgba(52,211,153,0.65); }
    #btn-recommend .dwell-bar { background: rgba(5, 46, 22, 0.4); }

    .nav-row { display: flex; gap: 6px; width: 100%; }
    .nav-btn {
      flex: 1; height: 75px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--sub); font-size: 1.5rem;
      cursor: pointer; position: relative; overflow: hidden;
      transition: border-color .2s, color .2s;
    }
    .nav-btn:disabled { opacity: 0.28; cursor: not-allowed; }
    .nav-btn:not(:disabled):hover { border-color: var(--gold); color: var(--gold); }

    #btn-tryon {
      width: 100%; height: 78px;
      border-radius: 12px;
      border: 1.5px solid var(--purple);
      background: rgba(167,139,250,0.12);
      color: var(--purple); font-size: 1.35rem; font-weight: 600;
      cursor: pointer; position: relative; overflow: hidden;
      transition: box-shadow .2s;
      font-family: inherit;
    }
    #btn-tryon:disabled { opacity: 0.28; cursor: not-allowed; }
    #btn-tryon.dwelling { box-shadow: 0 0 20px rgba(167,139,250,0.4); }

    #status-text {
      text-align: center; font-size: 1rem; font-weight: 500;
      color: var(--teal); min-height: 20px;
      padding: 0 2px; line-height: 1.5;
    }

    /* ── Results strip ───────────────────────────────────── */
    #results-strip {
      position: fixed;
      top: 595px;
      right: 12px;
      width: min(252px, calc(26vw - 24px));
      max-height: calc(100vh - 610px);
      z-index: 15;
      background: transparent;
      display: flex; flex-direction: column;
      align-items: stretch;
      gap: 10px; padding: 0;
      overflow: visible;
      transition: opacity .3s, transform .3s;
    }
    #results-strip.hidden { opacity: 0; pointer-events: none; transform: translateY(-10px); }

    #results-scroll-h {
      display: flex; flex-direction: column; gap: 10px;
      width: 100%;
    }
    .rcard-h {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--teal-border);
      background: rgba(8, 10, 20, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      overflow: hidden;
      position: relative;
      transition: border-color .2s;
    }
    .rcard-h.hovered, .rcard-h:hover {
      border-color: var(--teal);
      overflow: visible;
      z-index: 6;
    }
    .rcard-h img {
      width: 100%; height: 150px;
      object-fit: cover; display: block; background: #0f0f18;
      transition: width .28s ease, margin-left .28s ease,
                  box-shadow .28s ease, border-radius .28s ease;
    }
    .rcard-h.hovered img, .rcard-h:hover img {
      width: 180%; height: auto; max-height: 60vh;
      margin-left: -80%;
      object-fit: contain;
      position: relative; z-index: 6;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,.55);
    }
    .rcard-h-qr {
      display: none;
      position: absolute;
      left: calc(-80% + 50%);
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 8;
      width: min(220px, 86%);
      aspect-ratio: 1;
      padding: 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 10px 30px rgba(0,0,0,.55);
    }
    .rcard-h.hovered.qr-active .rcard-h-qr {
      display: block;
    }
    .rcard-h.hovered.qr-active > img {
      filter: brightness(0.38);
    }
    .rcard-h.hovered .rcard-h-qr img,
    .rcard-h-qr img {
      width: 100%; height: 100%;
      margin: 0;
      max-height: none;
      object-fit: contain;
      position: static;
      z-index: auto;
      background: transparent;
      box-shadow: none;
      border-radius: 0;
    }
    .rcard-h-body { padding: 6px 9px 8px; }
    .rcard-h-cat {
      font-size: 0.85rem; font-weight: 700;
      letter-spacing: .8px; text-transform: uppercase; color: var(--teal);
    }
    .rcard-h-name {
      font-size: 0.95rem; color: var(--sub);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 1px;
    }
    .strip-meta {
      flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 6px;
    }
    #results-badge {
      font-size: 0.95rem; color: var(--sub);
      background: rgba(255,255,255,0.06);
      border-radius: 20px; padding: 2px 10px;
      white-space: nowrap;
    }
    .strip-empty {
      display: flex; align-items: center; justify-content: center;
      flex: 1; font-size: 1rem; color: var(--muted);
    }

    /* ── VTON float (overlays left rail when active) ─────── */
    #vton-float {
      position: fixed;
      left: 12px;
      bottom: 14px; top: auto;
      width: 49vw; max-width: 720px;
      max-height: 49vh;
      z-index: 25;
      background: transparent;
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: opacity .3s, transform .3s;
    }
    #vton-float.hidden { opacity: 0; pointer-events: none; transform: translateX(-8px); }

    .vton-header {
      padding: 12px 14px 10px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .vton-header-label {
      font-size: 1rem; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase; color: var(--teal);
    }
    #vton-step-label { font-size: 0.9rem; color: var(--sub); }

    #vton-body {
      flex: 1; min-height: 160px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px; gap: 8px;
    }
    #vton-img {
      width: 100%; height: auto; max-height: 40vh;
      object-fit: contain; border-radius: 10px; display: none;
    }
    #vton-loading {
      display: none; flex-direction: column;
      align-items: center; gap: 16px;
    }
    .vton-loading-text { font-size: 1rem; font-weight: 500; color: var(--teal); }
    #vton-spinner {
      width: 52px; height: 52px;
      border: 4px solid rgba(255,255,255,0.08);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    #vton-placeholder {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px; padding: 20px 8px;
    }
    .vton-ph-icon { font-size: 2.4rem; opacity: 0.28; }
    .vton-ph-text { font-size: 1rem; color: var(--muted); text-align: center; line-height: 1.6; }
    #vton-status-label {
      font-size: 0.95rem; color: var(--teal);
      text-align: center; padding: 4px 8px 8px; flex-shrink: 0;
    }

    /* ── Dwell bar ───────────────────────────────────────── */
    .dwell-bar {
      position: absolute; top: 0; left: 0;
      width: 0%; height: 100%;
      background: rgba(52,211,153,0.50);
      pointer-events: none;
    }
    .dwell-bar.gold   { background: rgba(251,191,36,0.45); }
    .dwell-bar.purple { background: rgba(167,139,250,0.45); }

    /* ── Countdown overlay ───────────────────────────────── */
    #countdown-overlay {
      position: fixed; inset: 0; z-index: 60;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
    }
    .cd-label {
      font-size: 0.95rem; letter-spacing: 2.5px; text-transform: uppercase;
      color: rgba(255,255,255,0.5); font-weight: 500;
    }
    #countdown-num {
      font-size: 20rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--teal), var(--teal-bright));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 60px rgba(52,211,153,.55));
      animation: pop .38s cubic-bezier(.22,1,.36,1);
    }
    @keyframes pop {
      from { transform: scale(1.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* ── Loading overlay ─────────────────────────────────── */
    #loading-overlay {
      position: fixed; inset: 0; z-index: 60;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: rgba(0,0,0,.45);
      backdrop-filter: blur(8px);
    }
    .load-spinner {
      width: 52px; height: 52px;
      border: 3px solid rgba(52,211,153,0.15);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-title { font-size: 1.4rem; font-weight: 700; color: var(--text); }
    .load-sub   { font-size: 0.85rem; color: var(--sub); }

    /* ── Hand cursors ────────────────────────────────────── */
    .cursor {
      position: fixed; z-index: 100;
      pointer-events: none; display: none;
      transform: translate(-50%, -50%);
    }
    .c-inner {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2.5px solid; position: relative;
      transition: transform .08s;
    }
    .c-outer {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid; opacity: 0.35;
    }
    #cursor-l .c-inner { border-color: var(--teal);   background: rgba(52,211,153,0.18); }
    #cursor-l .c-outer { border-color: var(--teal); }
    #cursor-r .c-inner { border-color: #60a5fa; background: rgba(96,165,250,0.18); }
    #cursor-r .c-outer { border-color: #60a5fa; }
    .cursor.dwelling .c-inner { transform: scale(1.5); }

    .hidden { display: none !important; }

    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(52,211,153,0.2); border-radius: 2px; }
  </style>
</head>
<body>

<img id="cam" src="/detection_feed" alt="">
<div id="vignette"></div>
<div id="zone-box"></div>

<div id="zone-msg">
  <div class="zone-msg-title">전신이 박스 안에<br>들어오도록 서주세요</div>
  <div class="zone-msg-sub">손을 레일 버튼 위에 1초간 올려주세요</div>
</div>

<!-- ── Top bar ─────────────────────────────────────────── -->
<div id="topbar">
  <span id="clock">--:--</span>
  <div class="brand-group" aria-label="Smart Fitting Room with LG and Musinsa">
    <div class="app-title">Smart Fitting Room with.</div>
    <img class="brand-logo" src="/brand_logo/lg" alt="LG">
    <span class="brand-separator" aria-hidden="true">X</span>
    <img class="brand-logo" src="/brand_logo/musinsa" alt="Musinsa">
  </div>
  <div id="weather">☀ ...</div>
</div>

<!-- ── Left Rail ───────────────────────────────────────── -->
<div id="left-rail" class="rail">
  <div class="rail-section">
    <div class="rail-label">성별</div>
    <div class="pill-group-v">
      <button class="pill active" data-action="gender" data-val="남">남
        <div class="dwell-bar"></div>
      </button>
      <button class="pill" data-action="gender" data-val="여">여
        <div class="dwell-bar"></div>
      </button>
    </div>
  </div>

  <div class="rail-divider"></div>

  <div class="rail-section">
    <div class="rail-label">추천 기준</div>
    <div class="pill-group-v">
      <button class="pill active" data-action="anchor" data-val="tops">하의추천
        <div class="dwell-bar"></div>
      </button>
      <button class="pill" data-action="anchor" data-val="bottoms">상의추천
        <div class="dwell-bar"></div>
      </button>
      <button class="pill" data-action="anchor" data-val="full">전체
        <div class="dwell-bar"></div>
      </button>
    </div>
  </div>

  <div class="rail-divider"></div>

  <div class="rail-section">
    <div class="rail-label">음성 입력</div>
    <button id="btn-mic" data-action="mic">🎙
      <div class="dwell-bar"></div>
    </button>
    <div id="voice-display"></div>
    <input id="text-input" type="text" placeholder="조건 직접 입력...">
  </div>
</div>

<!-- ── VTON float (overlays left rail when active) ────── -->
<div id="vton-float" class="hidden">
  <div class="vton-header">
    <span class="vton-header-label">가상 피팅</span>
    <span id="vton-step-label"></span>
  </div>
  <div id="vton-body">
    <div id="vton-placeholder">
      <div class="vton-ph-icon">👚</div>
      <div class="vton-ph-text">입어보기 버튼을<br>눌러주세요</div>
    </div>
    <div id="vton-loading">
      <div id="vton-spinner"></div>
      <div class="vton-loading-text">가상 피팅 생성 중...</div>
    </div>
    <img id="vton-img" alt="VTON 결과">
  </div>
  <div id="vton-status-label"></div>
</div>

<!-- ── Results strip ──────────────────────────────────── -->
<div id="results-strip" class="hidden">
  <div id="results-scroll-h">
    <div class="strip-empty">추천 결과가 여기에 표시됩니다</div>
  </div>
  <div class="strip-meta">
    <span id="results-badge"></span>
  </div>
</div>

<!-- ── Right Rail ──────────────────────────────────────── -->
<div id="right-rail" class="rail">
  <div class="rail-section">
    <button id="btn-recommend" data-action="recommend">추천 받기
      <div class="dwell-bar"></div>
    </button>
  </div>

  <div class="rail-divider"></div>

  <div class="rail-section">
    <button id="btn-tryon" data-action="tryon" disabled>◈ 입어보기
      <div class="dwell-bar purple"></div>
    </button>
    <div class="rail-label">후보 탐색</div>
    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" data-action="prev" disabled>◀
        <div class="dwell-bar gold"></div>
      </button>
      <button class="nav-btn" id="btn-next" data-action="next" disabled>▶
        <div class="dwell-bar gold"></div>
      </button>
    </div>
  </div>
</div>

<!-- ── Countdown ──────────────────────────────────────── -->
<div id="countdown-overlay" class="hidden">
  <div class="cd-label">촬영 준비중</div>
  <div id="countdown-num">3</div>
</div>

<!-- ── Loading ─────────────────────────────────────────── -->
<div id="loading-overlay" class="hidden">
  <div class="load-spinner"></div>
  <div class="load-title">AI 분석중</div>
  <div class="load-sub" id="loading-sub">코디를 추천하고 있습니다...</div>
</div>

<!-- ── Hand cursors ───────────────────────────────────── -->
<div id="cursor-l" class="cursor"><div class="c-inner"><div class="c-outer"></div></div></div>
<div id="cursor-r" class="cursor"><div class="c-inner"><div class="c-outer"></div></div></div>

<script>
const S = {
  phase: 'idle',
  gender: '남',
  anchor: 'tops',
  textQuery: '',
  outfits: [],
  idx: 0,
  tryonReady: false,
  capturedTop: null,
  capturedBottom: null,
  vtonStatus: 'idle',  // idle | loading | done | error | none
  vtonImg: null,
  vtonStep: '',
  vtonError: '',
};

const $ = id => document.getElementById(id);
const sleep = ms => new Promise(r => setTimeout(r, ms));

// ── Clock ──────────────────────────────────────────────
(function tickClock() {
  const n = new Date();
  $('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  setTimeout(tickClock, 1000);
})();

// ── Weather ────────────────────────────────────────────
fetch('https://api.open-meteo.com/v1/forecast?latitude=37.57&longitude=126.98&current=temperature_2m,weathercode')
  .then(r => r.json())
  .then(d => {
    const t = Math.round(d.current.temperature_2m);
    const code = d.current.weathercode;
    const icon = code === 0 ? '☀' : code <= 3 ? '⛅' : code <= 67 ? '🌧' : '☁';
    $('weather').textContent = `${icon} Seoul, ${t}°C`;
  }).catch(() => { $('weather').textContent = ''; });

// ── Status ─────────────────────────────────────────────
function setStatus(msg) { const el = $('status-text'); if (el) el.innerHTML = msg.replace('\n', '<br>'); }

// ── Toggles ────────────────────────────────────────────
function applyToggle(action, val) {
  document.querySelectorAll(`[data-action="${action}"]`).forEach(b => {
    b.classList.toggle('active', b.dataset.val === val);
  });
  if (action === 'gender') S.gender = val;
  if (action === 'anchor') S.anchor = val;
}

// ── Voice ──────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec = null;
if (SR) {
  rec = new SR(); rec.lang = 'ko-KR'; rec.interimResults = false;
  rec.onstart  = () => {
    $('btn-mic').classList.add('listening'); setStatus('말씀해 주세요...');
    const vd = $('voice-display');
    vd.textContent = '🎙 말씀해 주세요...';
    vd.classList.add('active');
  };
  rec.onresult = e => {
    S.textQuery = e.results[0][0].transcript;
    $('text-input').value = S.textQuery;
    const vd = $('voice-display');
    vd.textContent = `"${S.textQuery}"`;
    vd.classList.add('active');
    setStatus(`음성: "${S.textQuery}"`);
  };
  rec.onerror = () => setStatus('음성 인식 실패');
  rec.onend   = () => $('btn-mic').classList.remove('listening');
}
function startMic() {
  if (!rec) { setStatus('음성 인식 미지원'); return; }
  try { rec.start(); } catch(_) {}
}

$('text-input').addEventListener('input', e => { S.textQuery = e.target.value; });

// ── Countdown ──────────────────────────────────────────
async function countdown() {
  const ov = $('countdown-overlay'), num = $('countdown-num');
  ov.classList.remove('hidden');
  for (let i = 3; i >= 1; i--) {
    num.textContent = i;
    num.style.animation = 'none'; void num.offsetWidth;
    num.style.animation = 'pop .38s cubic-bezier(.22,1,.36,1)';
    await sleep(1000);
  }
  ov.classList.add('hidden');
}

// ── Recommend ──────────────────────────────────────────
async function doRecommend() {
  if (!['idle','results'].includes(S.phase)) return;
  S.phase = 'countdown';
  $('zone-msg').classList.add('hidden');
  setStatus('촬영 준비중...');
  await countdown();

  S.phase = 'loading';
  $('loading-sub').textContent = '코디를 추천하고 있습니다...';
  $('loading-overlay').classList.remove('hidden');
  setStatus('AI가 분석중입니다...');

  const anchorCat = S.anchor === 'full' ? 'tops' : S.anchor;

  try {
    const res = await fetch('/recommend', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        anchor_category: anchorCat,
        gender: S.gender,
        text_query: S.textQuery,
        use_camera: true,
      }),
    });
    const data = await res.json();
    $('loading-overlay').classList.add('hidden');

    if (data.error) { setStatus('추천 실패:\n' + data.error); S.phase = 'idle'; return; }

    S.outfits        = data.outfits || [];
    S.capturedTop    = data.captured_top_b64 || null;
    S.capturedBottom = data.captured_bottom_b64 || null;
    S.idx            = 0;
    S.phase       = 'results';
    S.tryonReady  = true;

    renderResults();
    $('results-strip').classList.remove('hidden');
    $('btn-tryon').disabled = false;
    $('btn-prev').disabled  = false;
    $('btn-next').disabled  = false;
    setStatus(`추천 완료\n${S.outfits.length}가지 코디`);

    // 이전 결과 패널 닫고, top1 기준 VTON을 미리 백그라운드 요청
    $('vton-float').classList.add('hidden');
    prefetchTryon();
  } catch(e) {
    $('loading-overlay').classList.add('hidden');
    setStatus('네트워크 오류:\n' + e.message);
    S.phase = 'idle';
  }
}

// ── Results rendering ──────────────────────────────────
function getItems() {
  const o = S.outfits[S.idx];
  if (!o) return [];
  const topItem    = S.anchor === 'tops'    ? null : (o.tops    || [])[0];
  const bottomItem = S.anchor === 'bottoms' ? null : (o.bottoms || [])[0];
  return [
    topItem    ? { ...topItem,    cat: '상의' } : { cat: '상의', capturedTop:    true },
    bottomItem ? { ...bottomItem, cat: '하의' } : { cat: '하의', capturedBottom: true },
    { ...((o.shoes || [])[0] || {}), cat: '신발' },
  ];
}

function renderResults() {
  const scrollH = $('results-scroll-h');
  const items   = getItems();
  cardHover.clear();
  $('results-badge').textContent = `${S.idx+1} / ${S.outfits.length}`;

  if (!items.length) {
    scrollH.innerHTML = `<div class="strip-empty">아이템 없음</div>`;
    return;
  }
  scrollH.innerHTML = items.map(it => {
    let src, name;
    if (it.capturedTop) {
      src  = S.capturedTop    ? `data:image/jpeg;base64,${S.capturedTop}`    : '';
      name = '캡처된 상의';
    } else if (it.capturedBottom) {
      src  = S.capturedBottom ? `data:image/jpeg;base64,${S.capturedBottom}` : '';
      name = '캡처된 하의';
    } else {
      src  = it.image_path ? `/product_image/${it.image_path}` : '';
      name = it.name || '-';
    }
    const qr = it.qr_b64
      ? `<div class="rcard-h-qr"><img src="data:image/png;base64,${it.qr_b64}" alt="${name} QR"></div>`
      : '';
    return `
    <div class="rcard-h">
      <img src="${src}" alt="${name}" onerror="this.style.visibility='hidden'">
      ${qr}
      <div class="rcard-h-body">
        <div class="rcard-h-cat">${it.cat}</div>
        <div class="rcard-h-name">${name}</div>
      </div>
    </div>`;
  }).join('');
}

function navigate(dir) {
  if (!S.outfits.length) return;
  S.idx = (S.idx + dir + S.outfits.length) % S.outfits.length;
  renderResults();
}

// ── VTON ───────────────────────────────────────────────
// 추천 top1 기준 VTON 요청 본문 구성
function buildTryonBody() {
  const o = S.outfits[0];
  if (!o) return null;
  const body = {};
  if (S.anchor === 'tops')         body.bottom_image_path = (o.bottoms||[])[0]?.image_path;
  else if (S.anchor === 'bottoms') body.top_image_path    = (o.tops||[])[0]?.image_path;
  else {
    body.top_image_path    = (o.tops||[])[0]?.image_path;
    body.bottom_image_path = (o.bottoms||[])[0]?.image_path;
  }
  if (!body.top_image_path && !body.bottom_image_path) return null;
  return body;
}

// 추천받기 직후 백그라운드로 VTON API 요청을 미리 보냄(결과는 state에 저장)
async function prefetchTryon() {
  const body = buildTryonBody();
  S.vtonImg = null; S.vtonStep = ''; S.vtonError = '';
  if (!body) { S.vtonStatus = 'none'; renderVton(); return; }
  S.vtonStatus = 'loading';
  renderVton();
  try {
    const resp = await fetch('/tryon', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let   buf    = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += dec.decode(value, {stream: true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let ev; try { ev = JSON.parse(line.slice(6)); } catch { continue; }
        if (ev.error) { S.vtonStatus = 'error'; S.vtonError = ev.error; renderVton(); return; }
        if (ev.result_b64) {
          S.vtonImg  = `data:${ev.mime||'image/jpeg'};base64,${ev.result_b64}`;
          S.vtonStep = ev.step;
          renderVton();
        }
        if (ev.step === 'done') S.vtonStatus = 'done';
      }
    }
    if (S.vtonStatus !== 'error') { S.vtonStatus = 'done'; renderVton(); }
  } catch(e) {
    S.vtonStatus = 'error'; S.vtonError = '오류 발생'; renderVton();
  }
}

// 현재 VTON state를 패널에 반영(패널이 열려있을 때만)
function renderVton() {
  if ($('vton-float').classList.contains('hidden')) return;
  const ph = $('vton-placeholder'), img = $('vton-img'), ld = $('vton-loading');
  const hide = el => { el.style.display = 'none'; };
  $('vton-step-label').textContent = S.vtonStep || '';
  if (S.vtonStatus === 'done') {
    img.src = S.vtonImg; img.style.display = 'block';
    hide(ld); hide(ph);
    $('vton-status-label').textContent = '완료 ✓';
  } else if (S.vtonStatus === 'error') {
    hide(ld); hide(ph);
    $('vton-status-label').textContent = '오류: ' + (S.vtonError || '');
  } else if (S.vtonStatus === 'none') {
    hide(ld); hide(img); ph.style.display = 'flex';
    $('vton-status-label').textContent = '피팅 대상 없음';
  } else { // loading
    hide(ph);
    if (S.vtonImg) { img.src = S.vtonImg; img.style.display = 'block'; hide(ld); }
    else { hide(img); ld.style.display = 'flex'; }
    $('vton-status-label').textContent = '처리중...';
  }
}

// 입어보기: 새 요청 없이 미리 받아둔(또는 로딩중인) 결과를 띄움
function doTryon() {
  $('vton-float').classList.remove('hidden');
  renderVton();
  setStatus(S.vtonStatus === 'done' ? '가상 피팅 완료' : '가상 피팅 처리중...');
}

// ── Action dispatch ────────────────────────────────────
function trigger(action, val) {
  if (action === 'anchor')    { applyToggle('anchor', val); return; }
  if (action === 'gender')    { applyToggle('gender', val); return; }
  if (action === 'mic')       { startMic(); return; }
  if (action === 'recommend') { doRecommend(); return; }
  if (action === 'tryon')     { doTryon(); return; }
  if (action === 'prev')      { navigate(-1); return; }
  if (action === 'next')      { navigate(+1); return; }
}

// ── Dwell ──────────────────────────────────────────────
const DWELL_MS = 1000;
const BLOCKING = new Set(['countdown','loading','vton_loading']);
const dwell = {
  left:  {el: null, t: 0},
  right: {el: null, t: 0},
};
const CARD_QR_MS = 3000;
const cardHover = new Map();

function hitTest(x, y) {
  for (const el of document.querySelectorAll('button:not(:disabled)')) {
    const r = el.getBoundingClientRect();
    if (x >= r.left && x <= r.right && y >= r.top && y <= r.bottom) return el;
  }
  return null;
}

function updateCardHover(points) {
  const now = Date.now();
  document.querySelectorAll('.rcard-h').forEach(c => {
    const r = c.getBoundingClientRect();
    const over = points.some(([x, y]) =>
      x >= r.left && x <= r.right && y >= r.top && y <= r.bottom);
    const hasQr = !!c.querySelector('.rcard-h-qr');
    let state = cardHover.get(c);
    if (over && !state) {
      state = { mode: 'hover', hoverStarted: now, qrDismissStarted: null };
      cardHover.set(c, state);
    }
    if (!state) {
      c.classList.remove('qr-active');
      c.classList.remove('hovered');
      return;
    }

    if (state.mode === 'qr') {
      if (over) {
        if (!state.qrDismissStarted) state.qrDismissStarted = now;
        if (now - state.qrDismissStarted >= CARD_QR_MS) {
          state.mode = 'hover';
          state.hoverStarted = now;
          state.qrDismissStarted = null;
          c.classList.add('hovered');
          c.classList.remove('qr-active');
          return;
        }
      } else {
        state.qrDismissStarted = null;
      }
      c.classList.add('hovered');
      c.classList.add('qr-active');
      return;
    }

    if (!over) {
      cardHover.delete(c);
      c.classList.remove('hovered');
      c.classList.remove('qr-active');
      return;
    }

    if (hasQr && now - state.hoverStarted >= CARD_QR_MS) {
      state.mode = 'qr';
      state.qrDismissStarted = now;
      c.classList.add('hovered');
      c.classList.add('qr-active');
      return;
    }

    c.classList.add('hovered');
    c.classList.remove('qr-active');
  });
}

function clearDwell(hand) {
  const d = dwell[hand];
  if (!d.el) return;
  const bar = d.el.querySelector('.dwell-bar');
  if (bar) bar.style.width = '0%';
  d.el.classList.remove('dwelling');
  d.el = null; d.t = 0;
}

function stepDwell(hand, x, y) {
  const d   = dwell[hand];
  const el  = hitTest(x, y);
  const cur = $(hand === 'left' ? 'cursor-l' : 'cursor-r');

  if (el !== d.el) {
    clearDwell(hand);
    d.el = el; d.t = el ? Date.now() : 0;
  }
  if (!el) { cur?.classList.remove('dwelling'); return; }

  const pct = Math.min(100, (Date.now() - d.t) / DWELL_MS * 100);
  const bar = el.querySelector('.dwell-bar');
  if (bar) bar.style.width = pct + '%';
  el.classList.add('dwelling');
  cur?.classList.add('dwelling');

  if (pct >= 100) {
    trigger(el.dataset.action, el.dataset.val);
    for (const h of ['left','right']) {
      if (dwell[h].el === el) { dwell[h].el = null; dwell[h].t = 0; }
    }
    if (bar) bar.style.width = '0%';
    el.classList.remove('dwelling');
    cur?.classList.remove('dwelling');
  }
}

// ── Mouse click (same dispatch as dwell) ───────────────
document.addEventListener('click', e => {
  const el = e.target.closest('button[data-action]');
  if (!el || el.disabled) return;
  if (BLOCKING.has(S.phase)) return;
  trigger(el.dataset.action, el.dataset.val);
});

// ── Cursor coord mapping ───────────────────────────────
// #cam: 카메라 프레임(iw×ih, 가로형)을 width:100vh/height:100vw 박스에
// object-fit:cover 로 채운 뒤 rotate(270deg) scaleX(-1) 한다.
// 단순 stretch 가 아니라 cover 의 crop·스케일을 반영해야 좌우 끝이 어긋나지 않는다.
// u = 카메라 가로비율(nx), v = 세로비율(ny)
function camToScreen([u, v]) {
  const cam = $('cam');
  const iw = cam.naturalWidth  || 640;   // 카메라 프레임 가로
  const ih = cam.naturalHeight || 480;   // 카메라 프레임 세로
  const VW = window.innerWidth, VH = window.innerHeight;
  const s = Math.max(VH / iw, VW / ih);  // object-fit: cover 스케일 (박스 = VH×VW)
  return [
    VW / 2 + ih * s * (v - 0.5),  // 가로축 (회전으로 카메라 세로→화면 가로)
    VH / 2 + iw * s * (u - 0.5),  // 세로축 (카메라 가로→화면 세로, 미러 반영)
  ];
}
function moveCursor(id, norm) {
  const el = $(id);
  if (!norm) { el.style.display = 'none'; return; }
  const [sx, sy] = camToScreen(norm);
  el.style.display = 'block';
  el.style.left = sx + 'px';
  el.style.top  = sy + 'px';
}

// ── Pose poll ──────────────────────────────────────────
async function pollPose() {
  try {
    const d = await fetch('/pose_poll').then(r => r.json());
    moveCursor('cursor-l', d.lw);
    moveCursor('cursor-r', d.rw);

    if (!BLOCKING.has(S.phase)) {
      if (d.lw) { const [x,y] = camToScreen(d.lw); stepDwell('left',  x, y); }
      else clearDwell('left');
      if (d.rw) { const [x,y] = camToScreen(d.rw); stepDwell('right', x, y); }
      else clearDwell('right');
    }

    const handPts = [];
    if (d.lw) handPts.push(camToScreen(d.lw));
    if (d.rw) handPts.push(camToScreen(d.rw));
    updateCardHover(handPts);

    $('zone-box').classList.toggle('in-zone', d.in_zone);
    if (S.phase === 'idle') {
      if (d.in_zone) {
        $('zone-msg').classList.add('hidden');
        setStatus('Zone 감지됨\n손으로 버튼을 눌러보세요');
      } else {
        $('zone-msg').classList.remove('hidden');
        setStatus('화면 앞에 서서\n전신을 인식시켜 주세요');
      }
    } else if (S.phase === 'results' || S.phase === 'vton_done') {
      $('zone-msg').classList.add('hidden');
    }
  } catch(_) {}
}

setInterval(pollPose, 40);
</script>
</body>
