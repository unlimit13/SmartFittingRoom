<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Fitting Room</title>
  <style>
    :root {
      --bg: #0f0f13; --surface: #1c1c24;
      --accent: #a259ff; --green: #22c55e; --text: #f0f0f0; --muted: #777;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text);
           height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    header {
      flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
      padding: 10px 22px; background: var(--surface); border-bottom: 1px solid #ffffff10;
    }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
    .logo h1 { font-size: 1rem; font-weight: 700; }
    .live-badge { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--green); font-weight: 600; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .layout { flex: 1; display: flex; min-height: 0; }

    /* ── Camera col ── */
    .camera-col { flex: 0 0 55%; position: relative; background: #000; }
    #cam-feed { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }

    .btn-icon  { font-size: 2rem; line-height: 1; }
    .btn-label { font-size: 0.72rem; color: #ccc; font-weight: 600; }

    /* All 3 action buttons — stacked right of zone */
    .tryon-btn {
      position: absolute; right: calc(22% - 114px); width: 106px; height: 94px;
      background: rgba(0,0,0,.65); backdrop-filter: blur(8px);
      border-radius: 14px; border: 2px solid rgba(255,255,255,.15);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; overflow: hidden;
      transition: border-color .15s, background .15s;
    }
    .tryon-btn:hover  { border-color: var(--accent); background: rgba(162,89,255,.2); }
    .tryon-btn.hover  { border-color: var(--green);  background: rgba(34,197,94,.2); }
    .tryon-btn.firing { border-color: #facc15;        background: rgba(250,204,21,.2); }
    #btn-cancel        { top: calc(50% - 170px); }
    #btn-tops-tryon    { top: calc(50% -  56px); }
    #btn-bottoms-tryon { top: calc(50% +  58px); }
    #btn-cancel:hover, #btn-cancel.hover { border-color: #f87171; background: rgba(248,113,113,.2); }

    /* Dwell progress bar inside tryon buttons */
    .dwell-bar {
      position: absolute; bottom: 0; left: 0; height: 3px;
      background: var(--green); width: 0%;
    }

    /* Wrist cursor */
    #wrist-cursor {
      position: absolute; width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid #0ff; background: rgba(0,255,180,.25);
      transform: translate(-50%,-50%); pointer-events: none; display: none;
      box-shadow: 0 0 10px rgba(0,255,180,.5);
      transition: left .06s linear, top .06s linear;
    }

    /* Countdown overlay */
    #countdown {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      font-size: 8rem; font-weight: 900; color: #fff;
      text-shadow: 0 0 40px rgba(162,89,255,.9), 0 4px 16px rgba(0,0,0,.8);
      pointer-events: none; animation: countdown-pop .35s ease-out;
    }
    @keyframes countdown-pop {
      from { transform: scale(1.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* Zone status badge */
    #zone-status {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.65); color: #ccc; font-size: 0.78rem; font-weight: 600;
      padding: 5px 16px; border-radius: 20px; pointer-events: none;
      white-space: nowrap; border: 1px solid rgba(255,255,255,.1);
      transition: color .2s, border-color .2s;
    }
    #zone-status.in-zone  { color: var(--green); border-color: rgba(34,197,94,.4); }
    #zone-status.counting { color: #facc15;       border-color: rgba(250,204,21,.4); }

    /* ── Right result col ── */
    .result-col {
      flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 12px; min-width: 0;
    }
    .capture-wrap {
      flex: 1; border-radius: var(--radius); overflow: hidden;
      background: var(--surface); border: 1px solid #ffffff0e;
      position: relative; display: flex; align-items: center; justify-content: center; min-height: 0;
    }
    #capture-img { width: 100%; height: 100%; object-fit: contain; display: none; }
    .capture-placeholder { color: var(--muted); font-size: 0.88rem; text-align: center; line-height: 1.7; }
    .capture-badge {
      display: none; position: absolute; top: 9px; left: 11px;
      background: rgba(0,0,0,.6); color: #ccc; font-size: 0.68rem;
      padding: 2px 9px; border-radius: 20px;
    }
    .capture-loading {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,.55); align-items: center; justify-content: center;
      font-size: 0.85rem; color: #aaa;
    }
    .clothes-grid { flex: 0 0 160px; display: flex; gap: 8px; }
    .clothes-item {
      flex: 1; border-radius: 10px; overflow: hidden;
      background: var(--surface); border: 1px solid #ffffff0a;
    }
    .clothes-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .clothes-empty {
      height: 100%; display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 1.6rem;
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div><h1>Smart Fitting Room</h1></div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
</header>

<div class="layout">
  <div class="camera-col">
    <img id="cam-feed" src="/detection_feed" alt="camera">

    <div id="countdown"></div>
    <div id="wrist-cursor"></div>

    <div class="tryon-btn" id="btn-cancel">
      <div class="btn-icon">✕</div>
      <div class="btn-label">취소</div>
      <div class="dwell-bar" id="dwell-cancel"></div>
    </div>

    <div class="tryon-btn" id="btn-tops-tryon">
      <div class="btn-icon">👕</div>
      <div class="btn-label">상의</div>
      <div class="dwell-bar" id="dwell-tops"></div>
    </div>

    <div class="tryon-btn" id="btn-bottoms-tryon">
      <div class="btn-icon">👖</div>
      <div class="btn-label">하의</div>
      <div class="dwell-bar" id="dwell-bottoms"></div>
    </div>

    <div id="zone-status">📍 Zone 안에 서주세요</div>
  </div>

  <div class="result-col">
    <div class="capture-wrap">
      <img id="capture-img" alt="캡처">
      <div class="capture-placeholder" id="capture-ph">🕴<br>카메라 Zone 안에<br><b>3초간</b> 서 있으면 자동 추천됩니다</div>
      <div class="capture-badge" id="capture-badge"></div>
      <div class="capture-loading" id="capture-loading">⏳ 처리 중...</div>
    </div>
    <div class="clothes-grid" id="clothes-grid">
      <div class="clothes-item"><div class="clothes-empty">👕</div></div>
      <div class="clothes-item"><div class="clothes-empty">👖</div></div>
      <div class="clothes-item"><div class="clothes-empty">👟</div></div>
    </div>
  </div>
</div>

<script>
const camFeed      = document.getElementById('cam-feed');
const wristCursor  = document.getElementById('wrist-cursor');
const countdownEl  = document.getElementById('countdown');
const zoneStatus   = document.getElementById('zone-status');
const captureImg   = document.getElementById('capture-img');
const capturePh    = document.getElementById('capture-ph');
const captureBadge = document.getElementById('capture-badge');
const captureLoad  = document.getElementById('capture-loading');
const clothesGrid  = document.getElementById('clothes-grid');
const btnCancel    = document.getElementById('btn-cancel');
const btnTopsT     = document.getElementById('btn-tops-tryon');
const btnBottomsT  = document.getElementById('btn-bottoms-tryon');
const dwellCancel  = document.getElementById('dwell-cancel');
const dwellTops    = document.getElementById('dwell-tops');
const dwellBottoms = document.getElementById('dwell-bottoms');

let _busy        = false;
let _tryonTop    = null;
let _tryonBottom = null;

// ── Wrist dwell state ────────────────────────────────────────────────
const WRIST_DWELL_MS = 1000;
let _wHoverTarget = null;
let _wHoverStart  = 0;

// ── Pose polling ─────────────────────────────────────────────────────
async function pollPose() {
  try {
    const data = await fetch('/pose_poll').then(r => r.json());
    updateZoneStatus(data);
    updateWristCursor(data.rw);
    if (data.triggered && !_busy) {
      _busy = true;
      doRecommend();
    }
  } catch (_) {}
}

function updateZoneStatus(data) {
  if (data.disabled) {
    zoneStatus.textContent = '🔒 취소 버튼을 눌러 다시 시작';
    zoneStatus.className = '';
    return;
  }
  const pct = data.hold_pct || 0;
  if (pct > 0) {
    zoneStatus.textContent = `⏳ ${(3 * (1 - pct)).toFixed(1)}초 유지 중...`;
    zoneStatus.className = 'counting';
  } else if (data.in_zone) {
    zoneStatus.textContent = '✅ Zone 안에 있습니다';
    zoneStatus.className = 'in-zone';
  } else {
    zoneStatus.textContent = '📍 Zone 안에 서주세요';
    zoneStatus.className = '';
  }
}

function updateWristCursor(rw) {
  if (!rw || _busy) {
    wristCursor.style.display = 'none';
    clearWristHover();
    return;
  }

  const camRect  = camFeed.getBoundingClientRect();
  const wrapRect = camFeed.parentElement.getBoundingClientRect();

  // Mirror x: right wrist is on left of raw frame → appears right in mirrored display
  const fx = 640 - rw[0];
  const fy = rw[1];

  const cx = (fx / 640) * camRect.width  + (camRect.left - wrapRect.left);
  const cy = (fy / 480) * camRect.height + (camRect.top  - wrapRect.top);

  wristCursor.style.left    = cx + 'px';
  wristCursor.style.top     = cy + 'px';
  wristCursor.style.display = 'block';

  // Hit-test tryon buttons (page coords)
  const px = (fx / 640) * camRect.width  + camRect.left;
  const py = (fy / 480) * camRect.height + camRect.top;
  const target = hitTryonBtn(px, py);

  if (target && target === _wHoverTarget) {
    const pct = Math.min(1, (Date.now() - _wHoverStart) / WRIST_DWELL_MS);
    getDwell(target).style.width = (pct * 100) + '%';
    document.getElementById(target).classList.add('hover');
    if (pct >= 1) {
      document.getElementById(target).classList.add('firing');
      fireWrist(target);
    }
  } else {
    clearWristHover();
    _wHoverTarget = target;
    _wHoverStart  = Date.now();
  }
}

const DWELL_BTN_IDS = ['btn-cancel', 'btn-tops-tryon', 'btn-bottoms-tryon'];

function hitTryonBtn(px, py) {
  for (const id of DWELL_BTN_IDS) {
    const el = document.getElementById(id);
    if (!el || el.style.display !== 'flex') continue;
    const r = el.getBoundingClientRect();
    const pad = 12;
    if (px >= r.left - pad && px <= r.right + pad &&
        py >= r.top  - pad && py <= r.bottom + pad) return id;
  }
  return null;
}

function getDwell(id) {
  if (id === 'btn-cancel')       return dwellCancel;
  if (id === 'btn-tops-tryon')   return dwellTops;
  return dwellBottoms;
}

function clearWristHover() {
  for (const id of DWELL_BTN_IDS) {
    document.getElementById(id).classList.remove('hover', 'firing');
  }
  dwellCancel.style.width  = '0%';
  dwellTops.style.width    = '0%';
  dwellBottoms.style.width = '0%';
  _wHoverTarget = null;
}

function fireWrist(id) {
  clearWristHover();
  if (id === 'btn-tops-tryon')         { if (!_busy) { _busy = true; doTryon(_tryonTop, null); } }
  else if (id === 'btn-bottoms-tryon') { if (!_busy) { _busy = true; doTryon(null, _tryonBottom); } }
  else if (id === 'btn-cancel')        doCancel();
}

// ── Countdown ─────────────────────────────────────────────────────────
function runCountdown() {
  return new Promise(resolve => {
    let n = 3;
    countdownEl.textContent = n;
    countdownEl.style.display = 'flex';
    const tick = () => {
      n--;
      if (n <= 0) {
        countdownEl.style.display = 'none';
        resolve();
      } else {
        countdownEl.style.animation = 'none';
        countdownEl.textContent = n;
        void countdownEl.offsetWidth;
        countdownEl.style.animation = '';
        setTimeout(tick, 1000);
      }
    };
    setTimeout(tick, 1000);
  });
}

// ── 추천 ─────────────────────────────────────────────────────────────
async function doRecommend() {
  _tryonTop = null; _tryonBottom = null;
  btnCancel.style.display   = 'none';
  btnTopsT.style.display    = 'none';
  btnBottomsT.style.display = 'none';

  await runCountdown();
  showLoading(true);

  try {
    const resp = await fetch('/recommend', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ use_camera: true, text_query: '' }),
    });
    const data = await resp.json();
    if (data.error) return;

    showCapture('data:image/jpeg;base64,' + data.annotated_b64, '📸 감지 결과');

    const outfits    = data.outfits || [];
    const first      = outfits[0] || {};
    const topItem    = (first.tops    || [])[0] || null;
    const bottomItem = (first.bottoms || [])[0] || null;
    const shoeItem   = (first.shoes   || [])[0] || null;

    clothesGrid.innerHTML = [
      topItem    ? `<img src="/product_image/${topItem.image_path}"    alt="">` : '<div class="clothes-empty">👕</div>',
      bottomItem ? `<img src="/product_image/${bottomItem.image_path}" alt="">` : '<div class="clothes-empty">👖</div>',
      shoeItem   ? `<img src="/product_image/${shoeItem.image_path}"   alt="">` : '<div class="clothes-empty">👟</div>',
    ].map(inner => `<div class="clothes-item">${inner}</div>`).join('');

    if (topItem    && topItem.image_path)    _tryonTop    = topItem.image_path;
    if (bottomItem && bottomItem.image_path) _tryonBottom = bottomItem.image_path;

    if (_tryonTop)    btnTopsT.style.display    = 'flex';
    if (_tryonBottom) btnBottomsT.style.display = 'flex';
    btnCancel.style.display = 'flex';

  } catch (_) {
  } finally {
    showLoading(false);
    _busy = false;
  }
}

// ── Virtual Try-On ────────────────────────────────────────────────────
async function doTryon(topPath, bottomPath) {
  if (!topPath && !bottomPath) return;
  const hasBoth = topPath && bottomPath;
  showLoading(true, topPath ? '👕 상의 생성 중...' : '👖 하의 생성 중...');

  try {
    const body = {};
    if (topPath)    body.top_image_path    = topPath;
    if (bottomPath) body.bottom_image_path = bottomPath;

    const resp = await fetch('/tryon', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.error) { showLoading(false); return; }
        if (data.step === 'tops') {
          showCapture(`data:${data.mime};base64,` + data.result_b64, '👕 상의 완료');
          if (hasBoth) showLoading(true, '👖 하의 생성 중...');
        } else if (data.step === 'bottoms') {
          showCapture(`data:${data.mime};base64,` + data.result_b64, '✨ Try-On 완료');
        } else if (data.step === 'done') {
          showLoading(false);
        }
      }
    }
  } catch (_) {
  } finally {
    showLoading(false);
    _busy = false;
  }
}

// ── UI helpers ────────────────────────────────────────────────────────
function showCapture(src, label) {
  captureImg.src = src;
  captureImg.style.display = 'block';
  capturePh.style.display  = 'none';
  captureBadge.textContent = label;
  captureBadge.style.display = 'block';
}
function showLoading(on, msg = '⏳ 처리 중...') {
  captureLoad.textContent   = msg;
  captureLoad.style.display = on ? 'flex' : 'none';
}

async function doCancel() {
  await fetch('/pose_reset', { method: 'POST' });
  btnCancel.style.display   = 'none';
  btnTopsT.style.display    = 'none';
  btnBottomsT.style.display = 'none';
  _tryonTop = null; _tryonBottom = null;
}

btnCancel.addEventListener('click', doCancel);
btnTopsT.addEventListener('click',    () => { if (!_busy) { _busy = true; doTryon(_tryonTop, null); } });
btnBottomsT.addEventListener('click', () => { if (!_busy) { _busy = true; doTryon(null, _tryonBottom); } });

setInterval(pollPose, 200);
</script>
</body>
</html>
