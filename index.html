<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPi5 Optimized Smart Mirror</title>
    <style>
        :root {
            /* RPi5 렌더링 부하 최소화를 위해 블러 대신 반투명 단색 사용 */
            --bg-color: rgba(15, 15, 15, 0.85); 
            --border-color: rgba(255, 255, 255, 0.15);
            --text-color: #ffffff;
            --highlight: #00ffcc;
            --recording: #ff3366;
            --guide-color: rgba(0, 255, 204, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: #000;
            overflow: hidden;
            color: var(--text-color);
        }

        /* 웹캠 배경 (Logitech 720p, 세로화면용 270도 회전) */
        #webcam {
            position: absolute;
            top: 50%;
            left: 50%;
            /* 270도 회전 시 가로/세로가 바뀌므로 뷰포트 단위를 교차 적용 */
            width: 100vh;
            height: 100vw;
            object-fit: cover;
            transform-origin: center center;
            /* 270도 회전 + 좌우반전(거울모드) */
            transform: translate(-50%, -50%) rotate(270deg) scaleX(-1);
            z-index: 0;
        }

        /* 카메라 화각(41도) 대비 전신 가이드라인 */
        .position-guide {
            position: absolute;
            top: 15%;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            border: 2px dashed var(--guide-color);
            border-radius: 20px;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            transition: opacity 0.3s;
        }

        .guide-text {
            color: var(--guide-color);
            font-size: 1.2rem;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 8px;
        }

        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        .panel {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            pointer-events: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            font-size: 1.2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .app-title {
            font-weight: 700;
            letter-spacing: 0.5px;
            font-size: 1.35rem;
            color: var(--highlight);
        }

        .weather {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .weather-icon {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: #ffd166;
            stroke-width: 2;
        }

        /* 추천 패널 */
        .recommendation-panel {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            transition: opacity 0.4s ease; /* GPU 가속 애니메이션 */
        }

        .recommendation-panel.show {
            opacity: 1;
        }

        .outfit-card {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }

        .rank { color: var(--highlight); }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .item-slot {
            aspect-ratio: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #888;
        }

        /* 하단 VUI 컨트롤 */
        footer {
            padding: 40px;
            display: flex;
            justify-content: center;
            padding-bottom: 50px;
        }

        .voice-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 500px;
            padding: 20px;
            text-align: center;
        }

        .voice-status {
            font-size: 1rem;
            color: var(--highlight);
            font-weight: bold;
        }

        .voice-transcript {
            font-size: 1.3rem;
            min-height: 1.5em;
            color: white;
        }

        .mic-btn {
            width: 52px;
            height: 52px;
            flex-shrink: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .mic-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .mic-btn svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* RPi 부하를 줄이기 위해 box-shadow 애니메이션 대신 transform 사용 */
        .mic-btn.listening {
            border-color: var(--recording);
            animation: scalePulse 1.2s infinite alternate;
        }

        .mic-btn.listening svg { fill: var(--recording); }

        @keyframes scalePulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* 스캔 이펙트 경량화 (단일 라인 이동) */
        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: var(--highlight);
            opacity: 0; z-index: 5;
            will-change: transform, opacity;
        }

        @keyframes scanFast {
            0% { transform: translateY(10vh); opacity: 1; }
            50% { transform: translateY(90vh); opacity: 1; }
            100% { transform: translateY(10vh); opacity: 0; }
        }

        /* ===================== 데모 시나리오 추가 스타일 ===================== */

        /* 가이드 박스 클릭(데모용 인식 트리거) */
        .position-guide { cursor: pointer; }
        .guide-text small { display: block; margin-top: 8px; font-size: 0.8rem; color: #aaa; }
        .position-guide.detected { opacity: 0; pointer-events: none; }

        /* 사람 인식 배지 */
        .person-badge { font-size: 0.95rem; color: #888; transition: color 0.3s; }
        .person-badge.detected { color: var(--highlight); }

        /* 상품 이미지 슬롯 (클릭 가능) */
        .item-slot { overflow: hidden; padding: 0; position: relative; cursor: pointer; }
        .item-slot img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .item-slot .slot-label {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.55); color: #fff; font-size: 0.7rem;
            padding: 3px 0; text-align: center;
        }
        .item-slot:active { transform: scale(0.96); }

        /* 상세 추천 항목 (썸네일 + 브랜드/상품명/가격) */
        .anchor-note {
            font-size: 0.8rem; color: #bbb; margin-top: 2px;
        }
        .anchor-note b { color: var(--highlight); }
        .item-list { display: flex; flex-direction: column; gap: 10px; }
        .item-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .item-row:hover { background: rgba(0, 255, 204, 0.08); border-color: rgba(0, 255, 204, 0.3); }
        .item-row:active { transform: scale(0.98); }
        .item-thumb {
            width: 64px; height: 64px; flex-shrink: 0;
            border-radius: 8px; overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            display: flex; align-items: center; justify-content: center;
        }
        .item-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .thumb-fallback { color: #888; font-size: 0.8rem; }
        .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
        .item-brand { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .item-name {
            font-size: 0.95rem; color: #fff; font-weight: 600;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-meta { display: flex; align-items: center; gap: 8px; }
        .item-cat {
            font-size: 0.7rem; color: var(--highlight);
            background: rgba(0, 255, 204, 0.12); padding: 1px 7px; border-radius: 10px;
        }
        .item-price { font-size: 0.9rem; color: #ddd; font-weight: 600; }
        .item-cta { font-size: 0.85rem; color: var(--highlight); flex-shrink: 0; }

        /* 캐러셀 (한 번에 1순위만 노출) */
        .carousel-track { position: relative; }
        .carousel-slide { display: none; }
        .carousel-slide.active { display: flex; flex-direction: column; gap: 12px; }
        .carousel-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 14px; gap: 12px;
        }
        .nav-arrow {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            color: #fff; font-size: 1.3rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; flex-shrink: 0;
        }
        .nav-arrow:active { transform: scale(0.92); }
        .carousel-dots { display: flex; gap: 6px; }
        .dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255, 255, 255, 0.25); }
        .dot.active { background: var(--highlight); }

        /* 하단 컨트롤 패널 (텍스트 입력 항상 표시) */
        .control-panel {
            width: 620px; max-width: 92vw;
            padding: 20px; display: flex; flex-direction: column;
            gap: 14px; align-items: center;
        }
        .anchor-row { display: flex; align-items: center; gap: 12px; }
        .anchor-label { font-size: 0.95rem; color: #aaa; }
        .anchor-toggles { display: flex; gap: 10px; }
        .anchor-toggle {
            padding: 10px 18px; border-radius: 24px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--border-color);
            color: #ddd; cursor: pointer; font-size: 1rem;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .anchor-toggle.active {
            background: var(--highlight); color: #003; border-color: var(--highlight);
            font-weight: bold;
        }
        .anchor-toggle:disabled { opacity: 0.4; cursor: not-allowed; }
        .input-row { display: flex; gap: 10px; width: 100%; }
        #style-input {
            flex: 1; padding: 14px 18px; border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            color: #fff; font-size: 1.1rem; outline: none;
        }
        #style-input::placeholder { color: #888; }
        #recommend-btn {
            padding: 0 24px; border-radius: 12px;
            background: var(--highlight); color: #003;
            border: none; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
        #recommend-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* QR 오버레이 */
        .qr-overlay {
            position: fixed; inset: 0; z-index: 30;
            background: rgba(0, 0, 0, 0.75);
            display: none; align-items: center; justify-content: center;
        }
        .qr-overlay.show { display: flex; }
        .qr-card {
            padding: 28px; display: flex; flex-direction: column;
            align-items: center; gap: 14px; text-align: center; width: 320px;
        }
        .qr-card img { width: 240px; height: 240px; background: #fff; border-radius: 8px; object-fit: contain; }
        .qr-product-name { font-size: 1.2rem; font-weight: bold; }
        .qr-hint { font-size: 0.95rem; color: #aaa; word-break: break-all; }
        .qr-close {
            margin-top: 6px; padding: 10px 22px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.12); border: 1px solid var(--border-color);
            color: #fff; cursor: pointer; font-size: 1rem;
        }

        /* VTON 결과 패널 (우측 하단, 입력창과 겹치지 않도록 위로 올림) */
        .vton-panel {
            position: fixed; right: 30px; bottom: 240px; z-index: 25;
            width: 240px; padding: 14px;
            display: none; flex-direction: column; gap: 10px;
        }
        .vton-panel.show { display: flex; }
        .vton-title { font-size: 0.95rem; color: var(--highlight); font-weight: bold; }
        .vton-view {
            position: relative; width: 100%; aspect-ratio: 3 / 4;
            border-radius: 8px; overflow: hidden; background: #111;
        }
        .vton-base { width: 100%; height: 100%; object-fit: cover; }
        .vton-product {
            position: absolute; left: 50%; top: 28%; transform: translateX(-50%);
            width: 58%; opacity: 0.92;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.6));
        }
        .vton-badge {
            position: absolute; top: 8px; left: 8px;
            background: var(--highlight); color: #003;
            font-size: 0.7rem; font-weight: bold; padding: 3px 8px; border-radius: 6px;
        }
    </style>
</head>
<body>

    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="capture-canvas" hidden></canvas>

    <!-- [1] 전신 인식 가이드 (데모: 박스 클릭 시 인식) -->
    <div class="position-guide" id="guide-box">
        <div class="guide-text">
            전신이 박스 안에<br>들어오도록 서주세요
            <small>(데모: 박스를 클릭하면 인식)</small>
        </div>
    </div>

    <div class="scan-line" id="scan-effect"></div>

    <div class="ui-layer">
        <header>
            <div id="clock">00:00</div>
            <div class="app-title">Smart Fitting Room</div>
            <div class="weather">
                <svg class="weather-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="5"></circle>
                    <g stroke-linecap="round">
                        <line x1="12" y1="1" x2="12" y2="4"></line>
                        <line x1="12" y1="20" x2="12" y2="23"></line>
                        <line x1="1" y1="12" x2="4" y2="12"></line>
                        <line x1="20" y1="12" x2="23" y2="12"></line>
                        <line x1="4.2" y1="4.2" x2="6.3" y2="6.3"></line>
                        <line x1="17.7" y1="17.7" x2="19.8" y2="19.8"></line>
                        <line x1="4.2" y1="19.8" x2="6.3" y2="17.7"></line>
                        <line x1="17.7" y1="6.3" x2="19.8" y2="4.2"></line>
                    </g>
                </svg>
                <span>Seoul, 22°C</span>
            </div>
        </header>

        <!-- [3] 코디 결과 캐러셀 (한 번에 1순위만 노출 + 스와이프) -->
        <aside class="recommendation-panel" id="results">
            <div class="carousel">
                <div class="carousel-track" id="carousel-track"></div>
                <div class="carousel-nav">
                    <div class="nav-arrow" id="prev-btn">&#8249;</div>
                    <div class="carousel-dots" id="carousel-dots"></div>
                    <div class="nav-arrow" id="next-btn">&#8250;</div>
                </div>
            </div>
        </aside>

        <!-- [2] 기준 의상 토글 + 텍스트 입력 (항상 표시) -->
        <footer>
            <div class="control-panel panel">
                <div class="anchor-row">
                    <span class="anchor-label">기준(Anchor) 의상:</span>
                    <div class="anchor-toggles" id="anchor-toggles">
                        <button class="anchor-toggle" data-cat="상의" disabled>상의</button>
                        <button class="anchor-toggle" data-cat="하의" disabled>하의</button>
                        <button class="anchor-toggle" data-cat="신발" disabled>신발</button>
                    </div>
                </div>
                <div class="input-row">
                    <input type="text" id="style-input" placeholder="예: 데이트룩 (비워두면 비전·색상 기준으로만 추천)" disabled>
                    <button class="mic-btn" id="mic-btn" title="음성으로 입력" disabled>
                        <svg viewBox="0 0 24 24">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </button>
                    <button id="recommend-btn" disabled>추천 받기</button>
                </div>
                <div class="voice-status" id="status-text">화면 앞에 서서 전신을 인식시켜 주세요</div>
            </div>
        </footer>
    </div>

    <!-- [4] QR 오버레이 -->
    <div class="qr-overlay" id="qr-overlay">
        <div class="qr-card panel">
            <div class="qr-product-name" id="qr-name">상품명</div>
            <img id="qr-image" alt="QR 코드">
            <div class="qr-hint">스마트폰으로 스캔하면<br>무신사 상품 페이지로 이동합니다</div>
            <div class="qr-hint" id="qr-url"></div>
            <button class="qr-close" id="qr-close">닫기</button>
        </div>
    </div>

    <!-- [4] VTON 결과 (우측 하단) -->
    <div class="vton-panel panel" id="vton-panel">
        <div class="vton-title">가상 피팅(VTON) 결과</div>
        <div class="vton-view">
            <span class="vton-badge">VTON</span>
            <img class="vton-base" id="vton-base" alt="캡쳐 전신샷">
            <img class="vton-product" id="vton-product" alt="선택 상품">
        </div>
    </div>

    <script>
        // ===================== 데모 데이터 =====================
        // 무신사 크롤링 이미지를 사용한 코디 세트 (1~3순위)
        const IMG = 'musinsa_out/images';
        const OUTFITS = [
            {
                rank: 1, match: 94,
                items: [
                    { cat: '상의', name: '오버핏 코튼 셔츠', brand: 'COVERNAT', price: 49000, img: `${IMG}/상의/1230705037469107271_3639350_5.jpg`, id: '3639350' },
                    { cat: '하의', name: '와이드 데님 팬츠', brand: 'LEE', price: 79000, img: `${IMG}/하의/1230705037469107271_3454288_1.jpg`, id: '3454288' },
                    { cat: '신발', name: '레트로 스니커즈', brand: 'NIKE', price: 119000, img: `${IMG}/신발/1230705037469107271_3607331_0.jpg`, id: '3607331' },
                ]
            },
            {
                rank: 2, match: 89,
                items: [
                    { cat: '상의', name: '베이직 니트', brand: 'MUSINSA STANDARD', price: 39000, img: `${IMG}/상의/1230710084870832374_3304232_0.jpg`, id: '3304232' },
                    { cat: '하의', name: '세미와이드 슬랙스', brand: 'ESFAI', price: 59000, img: `${IMG}/하의/1230710084870832374_3306075_0.jpg`, id: '3306075' },
                    { cat: '신발', name: '소프트 로퍼', brand: 'YEASE', price: 98000, img: `${IMG}/신발/1230710084870832374_3131133_0.jpg`, id: '3131133' },
                ]
            },
            {
                rank: 3, match: 85,
                items: [
                    { cat: '상의', name: '매시 후드 집업', brand: 'MARKM', price: 69000, img: `${IMG}/상의/1230806071720714205_3832983_0.jpg`, id: '3832983' },
                    { cat: '하의', name: '테이퍼드 트레이닝 팬츠', brand: 'NIKE', price: 55000, img: `${IMG}/하의/1230806071720714205_3956028_2.jpg`, id: '3956028' },
                    { cat: '신발', name: '청키 스니커즈', brand: 'ADIDAS', price: 139000, img: `${IMG}/신발/1230806071720714205_3860453_0.jpg`, id: '3860453' },
                ]
            },
        ];
        const musinsaUrl = (id) => `https://www.musinsa.com/products/${id}`;

        // ===================== 상태 =====================
        let detected = false;
        let capturedDataUrl = null;
        const selectedAnchors = new Set();
        let currentIndex = 0;

        const $ = (id) => document.getElementById(id);
        const setStatus = (t) => { $('status-text').innerText = t; };

        // ===================== 1. 웹캠 연동 (Logitech 720p / 최대 30fps) =====================
        async function setupCamera() {
            const video = $('webcam');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        frameRate: { ideal: 30, max: 30 }
                    }
                });
                video.srcObject = stream;
            } catch (error) {
                console.error("카메라 로드 실패");
                video.style.background = "#111";
            }
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            $('clock').innerText = `${hours}:${minutes}`;
        }

        // ===================== STT (음성 → 텍스트 입력) =====================
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                $('mic-btn').classList.add('listening');
                setStatus('듣는 중... 원하는 스타일을 말씀해 주세요');
            };
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                $('style-input').value = text;
                setStatus(`입력됨: "${text}" — 추천을 요청하세요`);
            };
            recognition.onerror = () => setStatus('음성 인식에 실패했어요. 다시 시도하거나 직접 입력해 주세요');
            recognition.onend = () => $('mic-btn').classList.remove('listening');
        }

        // ===================== 1. 전신 인식 + 캡쳐 (데모: 클릭 트리거) =====================
        function captureSnapshot() {
            const v = $('webcam');
            const c = $('capture-canvas');
            const vw = v.videoWidth || 1280;
            const vh = v.videoHeight || 720;
            // 세로화면용 270도 회전 + 좌우반전된 캡쳐 프레임 생성
            c.width = vh;
            c.height = vw;
            const ctx = c.getContext('2d');
            ctx.save();
            ctx.translate(c.width / 2, c.height / 2);
            ctx.rotate(-90 * Math.PI / 180);
            ctx.scale(-1, 1);
            ctx.drawImage(v, -vw / 2, -vh / 2, vw, vh);
            ctx.restore();
            try { capturedDataUrl = c.toDataURL('image/jpeg', 0.85); } catch (e) { capturedDataUrl = null; }
        }

        function detectPerson() {
            if (detected) return;
            detected = true;
            captureSnapshot();
            $('guide-box').classList.add('detected');
            // 컨트롤 활성화
            document.querySelectorAll('.anchor-toggle').forEach(b => b.disabled = false);
            $('style-input').disabled = false;
            $('mic-btn').disabled = false;
            $('recommend-btn').disabled = false;
            setStatus('기준 의상을 선택하고 스타일을 입력(또는 음성 입력)해 주세요');
        }

        // ===================== 2. 기준 의상 토글 =====================
        document.querySelectorAll('.anchor-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const cat = btn.dataset.cat;
                if (selectedAnchors.has(cat)) {
                    selectedAnchors.delete(cat);
                    btn.classList.remove('active');
                } else {
                    selectedAnchors.add(cat);
                    btn.classList.add('active');
                }
            });
        });

        // ===================== 2~3. 추천 요청 + 파이프라인 시뮬레이션 =====================
        function recommend() {
            if (!detected) { setStatus('먼저 전신을 인식시켜 주세요'); return; }
            if (selectedAnchors.size === 0) { setStatus('기준(Anchor) 의상을 1개 이상 선택해 주세요'); return; }

            const query = $('style-input').value.trim();

            // 스캔 애니메이션
            const scan = $('scan-effect');
            scan.style.animation = 'none';
            void scan.offsetWidth;
            scan.style.animation = 'scanFast 1s ease-in-out';

            setStatus(query
                ? `"${query}" 기준으로 분석 중...`
                : '비전 벡터·색상 기준으로 분석 중... (텍스트 유사도 제외)');

            $('recommend-btn').disabled = true;
            setTimeout(() => {
                renderCarousel();
                currentIndex = 0;
                showSlide(0);
                $('results').classList.add('show');
                $('recommend-btn').disabled = false;
                setStatus('추천 완료 — 화살표/스와이프로 다른 코디를 확인하세요');
            }, 1000);
        }

        // ===================== 3. 캐러셀 렌더 =====================
        function renderCarousel() {
            const track = $('carousel-track');
            const dots = $('carousel-dots');
            track.innerHTML = '';
            dots.innerHTML = '';

            OUTFITS.forEach((outfit, idx) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.dataset.index = idx;

                const rankColor = outfit.rank === 1 ? 'var(--highlight)' : 'white';
                // 기준(Anchor)으로 선택한 카테고리는 추천에서 제외
                const recItems = outfit.items.filter(it => !selectedAnchors.has(it.cat));
                const anchorTxt = [...selectedAnchors].join(', ');
                const recTxt = recItems.map(it => it.cat).join(', ');

                const itemsHtml = recItems.map(it => `
                    <div class="item-row" data-id="${it.id}" data-name="${it.name}" data-img="${it.img}">
                        <div class="item-thumb">
                            <img src="${it.img}" alt="${it.cat}" onerror="this.style.display='none';this.parentNode.innerHTML='<span class=\\'thumb-fallback\\'>${it.cat}</span>'">
                        </div>
                        <div class="item-info">
                            <div class="item-brand">${it.brand}</div>
                            <div class="item-name">${it.name}</div>
                            <div class="item-meta">
                                <span class="item-cat">${it.cat}</span>
                                <span class="item-price">₩${it.price.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="item-cta">상세 &rsaquo;</div>
                    </div>`).join('');

                slide.innerHTML = `
                    <div class="outfit-card panel">
                        <div class="card-header">
                            <span class="rank" style="color:${rankColor}">#${outfit.rank} 추천 코디</span>
                            <span style="font-size:0.9rem;color:#aaa;">매칭률 ${outfit.match}%</span>
                        </div>
                        <div class="anchor-note">기준: <b>${anchorTxt}</b> · 추천: ${recTxt}</div>
                        <div class="item-list">${itemsHtml}</div>
                    </div>`;
                track.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'dot';
                dots.appendChild(dot);
            });

            // 상품 행 클릭 → QR + VTON
            track.querySelectorAll('.item-row').forEach(row => {
                row.addEventListener('click', () => {
                    openProduct(row.dataset.id, row.dataset.name, row.dataset.img);
                });
            });
        }

        function showSlide(idx) {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.dot');
            if (slides.length === 0) return;
            currentIndex = (idx + slides.length) % slides.length;
            slides.forEach((s, i) => s.classList.toggle('active', i === currentIndex));
            dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
        }

        $('prev-btn').addEventListener('click', () => showSlide(currentIndex - 1));
        $('next-btn').addEventListener('click', () => showSlide(currentIndex + 1));

        // 스와이프(터치) 지원
        let touchStartX = 0;
        $('results').addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].clientX; }, { passive: true });
        $('results').addEventListener('touchend', (e) => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 40) showSlide(currentIndex + (dx < 0 ? 1 : -1));
        }, { passive: true });

        // ===================== 4. 상품 상세: QR + VTON =====================
        function openProduct(id, name, img) {
            const url = musinsaUrl(id);
            $('qr-name').innerText = name;
            $('qr-url').innerText = url;
            $('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(url)}`;
            $('qr-overlay').classList.add('show');

            // VTON: 캡쳐 전신샷 + 선택 상품 합성(데모)
            if (capturedDataUrl) $('vton-base').src = capturedDataUrl;
            $('vton-product').src = img;
            $('vton-panel').classList.add('show');
        }

        $('qr-close').addEventListener('click', () => $('qr-overlay').classList.remove('show'));
        $('qr-overlay').addEventListener('click', (e) => {
            if (e.target === $('qr-overlay')) $('qr-overlay').classList.remove('show');
        });

        // ===================== 이벤트 바인딩 =====================
        $('guide-box').addEventListener('click', detectPerson);
        $('recommend-btn').addEventListener('click', recommend);
        $('mic-btn').addEventListener('click', () => {
            if (!recognition) { setStatus('이 브라우저는 음성 인식을 지원하지 않아요. 직접 입력해 주세요'); return; }
            try { recognition.start(); } catch (e) { /* 이미 실행 중 */ }
        });
        $('style-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') recommend(); });

        setupCamera();
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
